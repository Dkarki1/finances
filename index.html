          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.5rem;">
            <div style="text-align:center;background:rgba(255,255,255,0.1);border-radius:10px;padding:1rem;">
              <div style="font-size:11px;opacity:0.7;text-transform:uppercase;">Annual Income</div>
              <div style="font-size:18px;font-weight:700;margin-top:0.25rem;" class="num">${AUD(annualIncome)}</div>
            </div>
            <div style="text-align:center;background:rgba(255,255,255,0.1);border-radius:10px;padding:1rem;">
              <div style="font-size:11px;opacity:0.7;text-transform:uppercase;">Est. Tax Payable</div>
              <div style="font-size:18px;font-weight:700;margin-top:0.25rem;" class="num">${AUD(Math.round(totalTax))}</div>
            </div>
            <div style="text-align:center;background:rgba(255,255,255,0.1);border-radius:10px;padding:1rem;">
              <div style="font-size:11px;opacity:0.7;text-transform:uppercase;">Effective Rate</div>
              <div style="font-size:18px;font-weight:700;margin-top:0.25rem;">${effectiveRate}%</div>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>✏️ Income for Tax Calculation</h2>
          <p class="text-muted" style="font-size:13px;margin-bottom:1rem;">
            ${usingCustom
              ? 'Using your manually entered income. Your app income is ' + AUD(appIncome) + '/yr.'
              : 'Using your app income (' + AUD(appIncome) + '/yr). Override below if your taxable income differs.'}
          </p>
          <div style="display:flex;gap:0.75rem;align-items:flex-end;flex-wrap:wrap;">
            <div class="form-group" style="flex:1;min-width:180px;margin-bottom:0;">
              <label>Annual Income ($)</label>
              <input type="number" id="taxIncomeInput" value="${annualIncome}" min="0" placeholder="e.g. 85000"
                style="font-size:16px;font-weight:600;">
            </div>
            <button class="btn-primary" onclick="applyTaxIncome()" style="flex-shrink:0;">Apply</button>
            ${usingCustom ? '<button class="btn-secondary" onclick="resetTaxIncome()" style="flex-shrink:0;">Reset to App Income</button>' : ''}
          </div>
          ${usingCustom ? '<div style="margin-top:0.75rem;padding:0.5rem 0.75rem;background:#FEF9C3;border-radius:6px;font-size:12px;color:#854D0E;font-weight:500;">⚡ Custom income active — calculations below use your override.</div>' : ''}
        </div>

        <div class="card">
          <h2>Tax Breakdown</h2>
          ${[
            { label: 'Gross Annual Income', value: AUD(Math.round(annualIncome)), note: usingCustom ? 'Manually entered' : 'App monthly income × 12' },
            { label: 'Income Tax', value: '−'+AUD(Math.round(taxOwed)), note: '2024–25 ATO progressive brackets' },
            { label: 'Medicare Levy (2%)', value: '−'+AUD(Math.round(mediLevy)), note: 'Standard 2% above $23,226 threshold' },
            { label: 'Low Income Tax Offset (LITO)', value: '+'+AUD(Math.round(lito)), note: 'Up to $700 offset for lower incomes' },
            { label: 'Total Tax Payable', value: AUD(Math.round(totalTax)), note: 'Net tax before deductions', bold: true },
            { label: 'Monthly PAYG (approx)', value: AUD(Math.round(totalTax / 12)), note: 'What your employer withholds per month' },
            { label: 'Monthly Take-home', value: AUD(takeHomeMo), note: 'After-tax monthly income estimate', highlight: true }
          ].map(r => `
            <div class="flex-between" style="padding:0.8rem 0;border-bottom:1px solid #E2E8F0;${r.highlight?'background:#F0FDF4;padding:0.8rem;border-radius:8px;margin-top:0.5rem;border:none;':''}">
              <div>
                <div style="${r.bold?'font-weight:700;':r.highlight?'font-weight:700;color:#059669;':''}">${r.label}</div>
                <div style="font-size:12px;color:#64748B;">${r.note}</div>
              </div>
              <div class="num" style="font-weight:700;${r.highlight?'color:#059669;font-size:18px;':''};">${r.value}</div>
            </div>`).join('')}
        </div>

        <div class="card">
          <h2>HECS-HELP Repayment</h2>

            <div class="form-group" style="flex:1;min-width:150px;margin-bottom:0;"><label>HECS Balance ($)</label><input type="number" id="hecsBalance" placeholder="0" min="0" oninput="calcHECS()"></div>

        </div>

          <div class="form-row">
            <div class="form-group"><label>Work from Home (hrs/week)</label><input type="number" id="wfhHrs" placeholder="0" min="0" oninput="calcDeductions()"></div>
            <div class="form-group"><label>Work-related Expenses ($)</label><input type="number" id="workExp" placeholder="0" min="0" oninput="calcDeductions()"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Charitable Donations ($)</label><input type="number" id="donations" placeholder="0" min="0" oninput="calcDeductions()"></div>
            <div class="form-group"><label>Other Deductions ($)</label><input type="number" id="otherDed" placeholder="0" min="0" oninput="calcDeductions()"></div>
          </div>
          <div id="deductionResult"></div>
        </div>

        <div class="card">
          <h2>⚠️ Disclaimer</h2>
          <p class="text-muted" style="font-size:13px;">Rough estimate only. Does not account for HECS-HELP (above is separate), investment income, rental income, business income, or your specific circumstances. Always use myTax at ato.gov.au or a registered tax agent for your actual return.</p>
        </div>`;
    }
    function applyTaxIncome() {
      const val = parseFloat(document.getElementById('taxIncomeInput')?.value);
      if (!val || val <= 0) { showToast('Enter a valid annual income', 'error'); return; }
      taxCustomIncome = val;
      renderMain();
      showToast('✓ Income updated', 'success');
    }
    function resetTaxIncome() {
      taxCustomIncome = null;
      renderMain();
      showToast('✓ Reset to app income', 'success');
    }
    function calcHECS() {
      const bal = parseFloat(document.getElementById('hecsBalance')?.value) || 0;
      if (bal <= 0) { document.getElementById('hecsResult').innerHTML = ''; return; }
      const income = getTaxIncome();
      // 2024-25 HECS repayment thresholds
      const rates = [
        [54,435,0],[62,739,0.01],[66,308,0.02],[70,085,0.025],[74,990,0.03],[79,207,0.035],
        [83,985,0.04],[88,524,0.045],[93,000,0.05],[97,001,0.055],[101,046,0.06],[105,289,0.065],
        [109,958,0.07],[114,957,0.075],[119,882,0.08],[124,728,0.085],[129,878,0.09],[134,944,0.095],[999999,0.10]
      ];
      let rate = 0;
      for (const [threshold, r] of rates) { if (income <= threshold * 1000) { rate = r; break; } }
      if (income < 54435) { document.getElementById('hecsResult').innerHTML = '<div style="padding:0.75rem;background:#F0FDF4;border-radius:8px;font-size:13px;color:#059669;">Below repayment threshold — no mandatory repayment this year.</div>'; return; }
      const annual = Math.round(income * rate);
      const monthly = Math.round(annual / 12);
      const fortnightly = Math.round(annual / 26);
      const yearsToPayoff = bal / annual;
      document.getElementById('hecsResult').innerHTML = `
        <div style="padding:1rem;background:#FEF3C7;border-radius:10px;border-left:3px solid #F59E0B;">
          <div class="flex-between" style="margin-bottom:0.5rem;"><span style="font-weight:600;">Repayment rate</span><span style="font-weight:700;">${(rate*100).toFixed(1)}% of income</span></div>
          <div class="flex-between" style="margin-bottom:0.5rem;"><span>Annual repayment</span><span class="num" style="font-weight:600;">${AUD(annual)}</span></div>
          <div class="flex-between" style="margin-bottom:0.5rem;"><span>Monthly (approx)</span><span class="num" style="font-weight:600;">${AUD(monthly)}</span></div>
          <div class="flex-between" style="margin-bottom:0.5rem;"><span>Fortnightly (approx)</span><span class="num" style="font-weight:600;">${AUD(fortnightly)}</span></div>
          <div class="flex-between"><span>Est. payoff</span><span style="font-weight:700;">${yearsToPayoff < 1 ? 'Under 1 year' : yearsToPayoff.toFixed(1) + ' years'}</span></div>
        </div>`;
    }
    function calcDeductions() {
      const wfh = (parseFloat(document.getElementById('wfhHrs')?.value)||0) * 52 * 0.67;
      const workExp = parseFloat(document.getElementById('workExp')?.value)||0;
      const donations = parseFloat(document.getElementById('donations')?.value)||0;
      const other = parseFloat(document.getElementById('otherDed')?.value)||0;
      const total = wfh + workExp + donations + other;
      if (total <= 0) { document.getElementById('deductionResult').innerHTML = ''; return; }
      const income = getTaxIncome();
      const taxBefore = calcTax(income);
      const taxAfter = calcTax(Math.max(0, income - total));
      const saving = Math.max(0, taxBefore - taxAfter);
      const newIncome = Math.max(0, income - total);
      document.getElementById('deductionResult').innerHTML = `
        <div style="margin-top:1rem;padding:1rem;background:#F0FDF4;border-radius:10px;border-left:3px solid #10B981;">

          <div class="flex-between" style="margin-bottom:0.5rem;"><span>Taxable income after deductions</span><span class="num" style="font-weight:600;">${AUD(Math.round(newIncome))}</span></div>
          <div class="flex-between"><span style="font-weight:700;">Estimated tax saving</span><span class="num" style="font-weight:700;color:#10B981;font-size:16px;">~${AUD(Math.round(saving))}</span></div>
        </div>`;
    }

    // ═══════════════════════════════════════════════════════════════
    function getMilestonesForDebt(debtId) {
      return Object.entries(debtMilestones).filter(([k]) => k.startsWith(debtId + '_')).map(([k, v]) => v);
    }


    // ═══════════════════════════════════════════════════════════════
    // INTEREST COST COUNTER
    // ═══════════════════════════════════════════════════════════════
    function dailyInterest() {
      return debts.reduce((s, d) => s + (d.balance || 0) * (d.rate || 0) / 100 / 365, 0);
    }
    function weeklyInterest() { return dailyInterest() * 7; }
    function monthlyInterestCost() {
      return debts.reduce((s, d) => s + (d.balance || 0) * (d.rate || 0) / 100 / 12, 0);
    }

    function checkNetWorthMilestones() {
      const nw = netWorth();
      const marks = [0, 5000, 10000, 25000, 50000, 100000, 250000, 500000];
      marks.forEach(m => {
        const key = 'nw_' + m;
        if (nw >= m && !netWorthMilestones[key]) {
          netWorthMilestones[key] = { value: m, date: today() };
          saveNetWorthMilestones();
          if (m === 0) showToast('🎉 Net worth crossed $0 — you\'re in the green!', 'success');
          else showToast('🎉 Net worth hit ' + AUD(m) + '!', 'success');

      });

    // BILL AUTO-RESET (1st of each month)
    // ═══════════════════════════════════════════════════════════════
    function autoResetBills() {
      const now = new Date();
      if (now.getDate() !== 1) return;
      const key = getMonthKey();
      const resetKey = 'autoReset_' + key;
      if (localStorage.getItem(resetKey)) return;
      let changed = false;
      bills.forEach(b => { if (b.paid) { b.paid = false; b.paidDate = ''; changed = true; } });
      if (changed) { saveBills(); showToast('🔄 Bills reset for new month', 'success'); }
      localStorage.setItem(resetKey, '1');
    }

    // ═══════════════════════════════════════════════════════════════
    // DEBT PAYOFF TIMELINE
    // ═══════════════════════════════════════════════════════════════
    function renderDebtTimeline() {
      if (debts.length === 0) return '<div class="card"><p class="text-muted text-center">No debts added yet.</p></div>';
      const sorted = getSortedDebts();
      const extraMonthly = Math.max(0, monthlySurplus() * 0.5);
      let remaining = extraMonthly;
      const timeline = [];
      const now = new Date();
      sorted.forEach((d, i) => {
        let balance = d.balance || 0;
        const minMonthly = toMonthly(d.minPayment, d.minFreq || 'monthly');
        const extra = i === 0 ? remaining : 0;
        const payment = minMonthly + extra;
        const rate = (d.rate || 0) / 100 / 12;
        let months = 0;
        let totalInterest = 0;
        let bal = balance;
        while (bal > 0 && months < 600) {
          const interest = bal * rate;
          totalInterest += interest;
          bal -= (payment - interest);
          months++;
        }
        const payoffDate = new Date(now);
        payoffDate.setMonth(payoffDate.getMonth() + months);
        timeline.push({ ...d, months, totalInterest, payoffDate, payment, extra });
        remaining += minMonthly; // snowball freed payment
      });
      const maxMonths = Math.max(...timeline.map(t => t.months), 1);
      const colors = ['#EF4444','#F97316','#F59E0B','#10B981','#3B82F6','#8B5CF6'];
      return `
        <div class="card" style="background:linear-gradient(135deg,#1E3A5F,#1D4ED8);color:white;border-radius:16px;">
          <h2 style="color:white;">🗓️ Debt Payoff Timeline</h2>
          <p style="opacity:0.8;font-size:13px;margin-top:0.25rem;">${debtMethod === 'avalanche' ? '🔥 Avalanche' : '❄️ Snowball'} method · surplus rolled into next debt</p>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.5rem;">
            <div style="text-align:center;background:rgba(255,255,255,0.1);border-radius:10px;padding:1rem;">
              <div style="font-size:11px;opacity:0.7;text-transform:uppercase;">Total Debt</div>
              <div style="font-size:20px;font-weight:700;margin-top:0.25rem;" class="num">${AUD(totalDebt())}</div>
            </div>
            <div style="text-align:center;background:rgba(255,255,255,0.1);border-radius:10px;padding:1rem;">
              <div style="font-size:11px;opacity:0.7;text-transform:uppercase;">Total Interest</div>
              <div style="font-size:20px;font-weight:700;margin-top:0.25rem;" class="num">${AUD(Math.round(timeline.reduce((s,t) => s+t.totalInterest, 0)))}</div>
            </div>
            <div style="text-align:center;background:rgba(255,255,255,0.1);border-radius:10px;padding:1rem;">
              <div style="font-size:11px;opacity:0.7;text-transform:uppercase;">Debt Free</div>
              <div style="font-size:16px;font-weight:700;margin-top:0.25rem;">${timeline.length > 0 ? timeline[timeline.length-1].payoffDate.toLocaleDateString('en-AU',{month:'short',year:'numeric'}) : '—'}</div>
            </div>
          </div>
        </div>
        <div class="card">
          <h2>Visual Timeline</h2>
          ${timeline.map((t, i) => {
            const widthPct = Math.min(100, (t.months / maxMonths) * 100);
            const milestones = getMilestonesForDebt(t.id);
            return `
              <div style="margin-bottom:1.5rem;">
                <div class="flex-between" style="margin-bottom:0.5rem;">
                  <div>
                    <span style="font-weight:700;">${i+1}. ${t.name}</span>
                    ${milestones.map(m => `<span class="milestone-badge" style="margin-left:0.5rem;">${m.pct}% ✓</span>`).join('')}
                  </div>
                  <div style="text-align:right;font-size:13px;">
                    <div class="num" style="font-weight:700;">${AUD(t.balance)}</div>
                    <div style="color:#64748B;">${t.months}mo · ${t.payoffDate.toLocaleDateString('en-AU',{month:'short',year:'numeric'})}</div>
                  </div>
                </div>
                <div style="height:28px;background:#F1F5F9;border-radius:8px;overflow:hidden;position:relative;">
                  <div style="height:100%;width:${widthPct}%;background:${colors[i%colors.length]};border-radius:8px;display:flex;align-items:center;padding:0 0.75rem;transition:width 0.6s ease;">
                    <span style="color:white;font-size:11px;font-weight:600;white-space:nowrap;">${t.rate}% · ${AUD(t.payment)}/mo</span>
                  </div>
                </div>
                <div style="font-size:11px;color:#94A3B8;margin-top:0.3rem;">Interest cost: ${AUD(Math.round(t.totalInterest))} · freed payment after: ${AUD(t.payment)}/mo</div>
              </div>`;
          }).join('')}
        </div>
        <div class="card">
          <h2>Month-by-Month Breakdown</h2>
          <div style="overflow-x:auto;">
            <table>
              <thead><tr><th>Debt</th><th>Balance</th><th>Rate</th><th>Payment/mo</th><th>Payoff Date</th><th>Interest Cost</th></tr></thead>
              <tbody>${timeline.map((t,i) => `
                <tr>
                  <td><strong>${i+1}. ${t.name}</strong></td>
                  <td class="num">${AUD(t.balance)}</td>
                  <td style="color:#EF4444;">${t.rate}%</td>
                  <td class="num">${AUD(Math.round(t.payment))}/mo</td>
                  <td><strong>${t.payoffDate.toLocaleDateString('en-AU',{month:'short',year:'numeric'})}</strong></td>
                  <td class="num" style="color:#EF4444;">${AUD(Math.round(t.totalInterest))}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
    }

    // ═══════════════════════════════════════════════════════════════
    // CATEGORY SPENDING TRENDS
    // ═══════════════════════════════════════════════════════════════
    function renderTrends() {
      const categories = ['Food','Transport','Entertainment','Shopping','Housing','Utilities','Health','Other'];
      const sixMonths = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date(); d.setMonth(d.getMonth()-i);
        sixMonths.push(getMonthKey(d));
      }
      const incomeVariance = () => {
        const myPays = variableIncome.filter(v => v.type === 'my').map(v => v.amount);
        if (myPays.length < 2) return 0;
        const avg = myPays.reduce((s,a) => s+a, 0) / myPays.length;
        const variance = myPays.reduce((s,a) => s + Math.pow(a-avg,2), 0) / myPays.length;
        return Math.round(Math.sqrt(variance));
      };
      const variance = incomeVariance();
      const buffer = variance * 2;
      return `
        <div class="card">
          <h2>📉 6-Month Spending by Category</h2>
          <p class="text-muted" style="font-size:13px;margin-bottom:1.5rem;">See which categories are creeping up month over month.</p>
          <canvas id="trendsChart" height="100"></canvas>
        </div>
        <div class="card">
          <h2>📊 Category Detail</h2>
          <div style="overflow-x:auto;">
            <table>
              <thead><tr><th>Category</th>${sixMonths.map(m => `<th style="text-align:right;">${new Date(m+'-01').toLocaleDateString('en-AU',{month:'short'})}</th>`).join('')}<th style="text-align:right;">Trend</th></tr></thead>
              <tbody>${categories.map(cat => {
                const monthly = sixMonths.map(m => transactions.filter(t => t.type==='expense' && t.category===cat && getMonthKey(new Date(t.date+'T00:00:00'))===m).reduce((s,t)=>s+t.amount,0));
                const first = monthly[0] || 0;
                const last = monthly[monthly.length-1] || 0;
                const trend = first === 0 ? 0 : Math.round(((last-first)/first)*100);
                const hasData = monthly.some(v => v > 0);
                if (!hasData) return '';
                return `<tr>
                  <td><strong>${cat}</strong></td>
                  ${monthly.map(v => `<td style="text-align:right;" class="num">${v > 0 ? AUD(v) : '—'}</td>`).join('')}
                  <td style="text-align:right;font-weight:700;color:${trend > 10 ? '#EF4444' : trend < -10 ? '#10B981' : '#64748B'};">${trend > 0 ? '▲' : trend < 0 ? '▼' : '—'}${Math.abs(trend)}%</td>
                </tr>`;
              }).join('')}</tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <h2>💪 Income Stability Score</h2>
          ${variance === 0 ? '<p class="text-muted">Log at least 2 pay cycles to see your stability score.</p>' : `
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;">
            <div style="text-align:center;padding:1rem;background:#F8FAFC;border-radius:10px;">
              <div style="font-size:11px;color:#64748B;text-transform:uppercase;">Pay Variance</div>
              <div style="font-size:20px;font-weight:700;margin-top:0.25rem;" class="num">±${AUD(variance)}</div>
            </div>
            <div style="text-align:center;padding:1rem;background:#F8FAFC;border-radius:10px;">
              <div style="font-size:11px;color:#64748B;text-transform:uppercase;">Recommended Buffer</div>
              <div style="font-size:20px;font-weight:700;margin-top:0.25rem;color:#F59E0B;" class="num">${AUD(buffer)}</div>
            </div>
            <div style="text-align:center;padding:1rem;background:#F8FAFC;border-radius:10px;">
              <div style="font-size:11px;color:#64748B;text-transform:uppercase;">Stability</div>
              <div style="font-size:20px;font-weight:700;margin-top:0.25rem;color:${variance < 200 ? '#10B981' : variance < 500 ? '#F59E0B' : '#EF4444'};">${variance < 200 ? '🟢 Stable' : variance < 500 ? '🟡 Moderate' : '🔴 Variable'}</div>
            </div>
          </div>
          <div style="padding:0.75rem 1rem;background:#FEF3C7;border-radius:8px;border-left:3px solid #F59E0B;font-size:13px;">
            Keep <strong>${AUD(buffer)}</strong> as a buffer in your everyday account to handle low pay weeks without touching debt payments or savings.
          </div>`}
        </div>
        <div class="card">
          <h2>🏅 Net Worth Milestones</h2>
          ${Object.keys(netWorthMilestones).length === 0 ? '<p class="text-muted">No milestones reached yet. Keep going!</p>' :
            Object.values(netWorthMilestones).sort((a,b) => a.value - b.value).map(m => `
              <div class="flex-between" style="padding:0.75rem 0;border-bottom:1px solid #E2E8F0;">
                <div style="display:flex;align-items:center;gap:0.75rem;">
                  <span style="font-size:20px;">🏅</span>
                  <div><div style="font-weight:600;">Net worth hit ${AUD(m.value)}</div><div style="font-size:12px;color:#64748B;">${m.date}</div></div>
                </div>
              </div>`).join('')}
        </div>`;
    }

                <option value="NZD">🇳🇿 NZD — New Zealand Dollar</option>
                <option value="PHP">🇵🇭 PHP — Philippine Peso</option>

              </select>
            </div>
            <div class="form-group">
              <label>To</label>
              <select id="currTo" onchange="calcCurrency()">
                <option value="AUD">🇦🇺 AUD — Australian Dollar</option>
                <option value="USD" selected>🇺🇸 USD — US Dollar</option>
                <option value="EUR">🇪🇺 EUR — Euro</option>
                <option value="GBP">🇬🇧 GBP — British Pound</option>
                <option value="NZD">🇳🇿 NZD — New Zealand Dollar</option>
                <option value="PHP">🇵🇭 PHP — Philippine Peso</option>
                <option value="INR">🇮🇳 INR — Indian Rupee</option>
                <option value="SGD">🇸🇬 SGD — Singapore Dollar</option>

          <button class="btn-primary" onclick="calcCurrency()">Convert</button>
          <div id="currResult" style="margin-top:1.5rem;"></div>
        </div>
        <div class="card">
          <h2>💡 Wise vs Bank Comparison</h2>
          <p class="text-muted" style="font-size:13px;margin-bottom:1rem;">Wise typically charges 0.4–0.9% vs banks charging 2–4% plus a flat fee.</p>
          <div id="wiseCompare"></div>
          <div style="margin-top:1rem;padding:0.75rem 1rem;background:#F0FDF4;border-radius:8px;border-left:3px solid #10B981;font-size:13px;">
            Use <strong>wise.com</strong> for international transfers — it uses the real mid-market rate with transparent fees. For large transfers, savings can be significant.
          </div>
        </div>`;
    }
    async function calcCurrency() {
      const amount = parseFloat(document.getElementById('currAmount')?.value) || 0;
      const from = document.getElementById('currFrom')?.value || 'AUD';
      const to = document.getElementById('currTo')?.value || 'USD';
      if (amount <= 0) { document.getElementById('currResult').innerHTML = ''; return; }
      document.getElementById('currResult').innerHTML = '<div style="color:#64748B;font-size:13px;">Loading rates...</div>';
      try {
        const res = await fetch('https://api.exchangerate-api.com/v4/latest/' + from);
        const data = await res.json();
        const rate = data.rates[to];
        if (!rate) throw new Error('Rate not found');
        const converted = amount * rate;
        const wiseFee = amount * 0.006;
        const wiseConverted = (amount - wiseFee) * rate;
        const bankFee = amount * 0.03 + 15;
        const bankConverted = (amount - bankFee) * rate;
        document.getElementById('currResult').innerHTML = `
          <div style="text-align:center;padding:1.5rem;background:#F0FDF4;border-radius:12px;margin-bottom:1rem;">
            <div style="font-size:13px;color:#64748B;margin-bottom:0.5rem;">${amount} ${from} =</div>
            <div style="font-size:32px;font-weight:700;color:#059669;">${converted.toLocaleString('en-AU',{maximumFractionDigits:2})} ${to}</div>
            <div style="font-size:12px;color:#94A3B8;margin-top:0.5rem;">Rate: 1 ${from} = ${rate.toFixed(4)} ${to}</div>
          </div>`;
        document.getElementById('wiseCompare').innerHTML = `
          <div style="display:grid;gap:0.75rem;">
            <div style="padding:1rem;background:#F0FDF4;border-radius:10px;border-left:3px solid #10B981;">
              <div class="flex-between"><span style="font-weight:600;">🟢 Wise</span><span class="num" style="font-weight:700;color:#059669;">${wiseConverted.toLocaleString('en-AU',{maximumFractionDigits:2})} ${to}</span></div>
              <div style="font-size:12px;color:#64748B;margin-top:0.25rem;">Fee: ~${AUD(wiseFee)} (0.6%) · Real mid-market rate</div>
            </div>
            <div style="padding:1rem;background:#FEF2F2;border-radius:10px;border-left:3px solid #EF4444;">
              <div class="flex-between"><span style="font-weight:600;">🔴 Typical Bank</span><span class="num" style="font-weight:700;color:#EF4444;">${bankConverted.toLocaleString('en-AU',{maximumFractionDigits:2})} ${to}</span></div>
              <div style="font-size:12px;color:#64748B;margin-top:0.25rem;">Fee: ~${AUD(Math.round(bankFee))} (3% + $15 flat) · Marked-up rate</div>
            </div>
            <div style="padding:0.75rem 1rem;background:#FEF9C3;border-radius:8px;font-size:13px;" class="flex-between">
              <span style="font-weight:600;">💰 Wise saves you approx.</span>
              <span class="num" style="font-weight:700;color:#92400E;">${((wiseConverted - bankConverted)).toLocaleString('en-AU',{maximumFractionDigits:2})} ${to}</span>
            </div>
          </div>`;
      } catch (e) {
        document.getElementById('currResult').innerHTML = '<div style="padding:0.75rem;background:#FEF2F2;border-radius:8px;font-size:13px;color:#EF4444;">Could not load live rates. Check your internet connection.</div>';
      }
    }


    // ═══════════════════════════════════════════════════════════════
    // PUSH NOTIFICATIONS
    // ═══════════════════════════════════════════════════════════════
    async function requestNotifications() {
      if (!('Notification' in window)) {
        showToast('Notifications not supported in this browser', 'error'); return;
      }
      const perm = await Notification.requestPermission();
      notificationsEnabled = perm === 'granted';
      const el = document.getElementById('notifStatus');
      if (el) el.innerHTML = perm === 'granted'
        ? '<div style="padding:0.5rem 0.75rem;background:#F0FDF4;border-radius:6px;font-size:13px;color:#059669;">✅ Notifications enabled</div>'
        : '<div style="padding:0.5rem 0.75rem;background:#FEF2F2;border-radius:6px;font-size:13px;color:#EF4444;">❌ Notifications blocked — check browser settings</div>';
      if (perm === 'granted') {
        showToast('✓ Notifications enabled', 'success');
        checkUpcomingBillNotifs();
      }
    }
    function testNotif(type) {
      if (Notification.permission !== 'granted') { showToast('Enable notifications first', 'error'); return; }
      if (type === 'bill') new Notification('FlowFinance 🧾', { body: 'Rent is due in 3 days — $1,800', icon: '' });
      if (type === 'payday') new Notification('FlowFinance ⚡', { body: 'Payday checklist ready! Open FlowFinance to complete your steps.' });
    }
    function checkUpcomingBillNotifs() {
      if (Notification.permission !== 'granted') return;
      const now = new Date();
      bills.filter(b => b.active && !b.paid).forEach(b => {
        const dueDay = parseInt(b.dueDay);
        const daysLeft = dueDay - now.getDate();
        if (daysLeft === 3) {
          setTimeout(() => new Notification('FlowFinance 🧾', { body: b.name + ' due in 3 days — ' + AUD(b.amount) }), 1000);
        }
      });
    }
    function scheduleMonthlyReminder() {
      if (Notification.permission !== 'granted') { showToast('Enable notifications first', 'error'); return; }
      // Schedule for 1st of next month at 9am using setTimeout
      const now = new Date();
      const next = new Date(now.getFullYear(), now.getMonth()+1, 1, 9, 0, 0);
      const ms = next - now;
      setTimeout(() => new Notification('FlowFinance 📊', { body: 'New month! Time for your monthly money review. Open FlowFinance.' }), ms);
      showToast('✓ Monthly reminder scheduled for ' + next.toLocaleDateString('en-AU'), 'success');
    }

    // ═══════════════════════════════════════════════════════════════
    // BILL SPLIT (couple mode)
    // ═══════════════════════════════════════════════════════════════
    function renderBillSplit() {
      const myInc = currentMonthLoggedPay('my') || toMonthly(income.myPay, income.myFreq);
      const partnerInc = currentMonthLoggedPay('partner') || toMonthly(income.partnerPay, income.partnerFreq);
      const total = myInc + partnerInc;
      if (total === 0) return '<p class="text-muted">Set up income in Dashboard first.</p>';
      const myPct = myInc / total;
      const partnerPct = partnerInc / total;
      const monthlyBills = monthlyBillsTotal();
      const myShare = monthlyBills * myPct;
      const partnerShare = monthlyBills * partnerPct;
      return `
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;">
          <div style="text-align:center;padding:1rem;background:#EFF6FF;border-radius:10px;">
            <div style="font-size:11px;color:#64748B;text-transform:uppercase;">Your Income</div>
            <div style="font-weight:700;font-size:16px;color:#1D4ED8;margin-top:0.25rem;" class="num">${AUD(myInc)}/mo</div>
            <div style="font-size:12px;color:#64748B;">${Math.round(myPct*100)}% of household</div>
          </div>
          <div style="text-align:center;padding:1rem;background:#FDF2F8;border-radius:10px;">
            <div style="font-size:11px;color:#64748B;text-transform:uppercase;">Partner Income</div>
            <div style="font-weight:700;font-size:16px;color:#EC4899;margin-top:0.25rem;" class="num">${AUD(partnerInc)}/mo</div>
            <div style="font-size:12px;color:#64748B;">${Math.round(partnerPct*100)}% of household</div>
          </div>
          <div style="text-align:center;padding:1rem;background:#F8FAFC;border-radius:10px;">
            <div style="font-size:11px;color:#64748B;text-transform:uppercase;">Total Bills</div>
            <div style="font-weight:700;font-size:16px;margin-top:0.25rem;" class="num">${AUD(monthlyBills)}/mo</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div style="padding:1rem;background:#EFF6FF;border-radius:10px;text-align:center;">
            <div style="font-size:13px;font-weight:600;color:#1D4ED8;margin-bottom:0.5rem;">👤 Your Share</div>
            <div style="font-size:24px;font-weight:700;color:#1D4ED8;" class="num">${AUD(Math.round(myShare))}</div>
            <div style="font-size:12px;color:#64748B;margin-top:0.25rem;">per month</div>
          </div>
          <div style="padding:1rem;background:#FDF2F8;border-radius:10px;text-align:center;">
            <div style="font-size:13px;font-weight:600;color:#EC4899;margin-bottom:0.5rem;">💼 Partner's Share</div>
            <div style="font-size:24px;font-weight:700;color:#EC4899;" class="num">${AUD(Math.round(partnerShare))}</div>
            <div style="font-size:12px;color:#64748B;margin-top:0.25rem;">per month</div>
          </div>
        </div>`;
    }

    // Main Render
    function renderMain() {
      let html = '';
      switch (currentTab) {
        case 'dashboard': html = renderDashboard(); break;
        case 'payplan': html = renderPayPlan(); break;
        case 'household': html = renderHousehold(); break;
        case 'transactions': html = renderTransactions(); break;
        case 'bills': html = renderBills(); break;
        case 'debts': html = renderDebts(); break;
        case 'budget': html = renderBudget(); break;
        case 'goals': html = renderGoals(); break;
        case 'networth': html = renderNetWorth(); break;
        case 'checklist': html = renderChecklist(); break;
        case 'afford': html = renderAfford(); break;
        case 'calendar': html = renderBillCalendar(); break;
        case 'spending': html = renderSpendingCategory(); break;
        case 'trends': html = renderTrends(); break;
        case 'monthlyhealth': html = renderMonthlyHealth(); break;
        case 'debtplan': html = renderDebtTimeline(); break;
      }
      const content = document.getElementById('mainContent');
      content.innerHTML = html;
      if (currentTab === 'transactions') {
        setTimeout(() => {
          ['txSearch', 'txCategory', 'txType'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', () => {
              const tbody = document.querySelector('table tbody');
              if (tbody) tbody.innerHTML = renderTxRows();
            });
          });
        }, 0);
      }
      if (currentTab === 'debts') {
        setTimeout(() => {
          const slider = document.getElementById('extraPayment');
          if (slider) {
            slider.addEventListener('input', updateSimulator);
            updateSimulator();
          }
        }, 0);
      }
      if (currentTab === 'budget') {
        setTimeout(() => renderBudgetCharts(), 0);
      }
      if (currentTab === 'networth') {
        setTimeout(() => renderNetWorthChart(), 0);
      }
      if (currentTab === 'savingsrate') {
        setTimeout(() => renderSavingsRateChart(), 0);
      }
      if (currentTab === 'trends') {
        setTimeout(() => renderTrendCharts(), 0);
      }
    }
    function renderAll() { renderHeader(); renderMain(); }

    // Household Expense Splitter
    function renderHousehold() {
      const totalOwed = householdExpenses.reduce((s, e) => s + e.amount, 0);
      const memberSplits = {};
      householdMembers.forEach(m => memberSplits[m.id] = { paid: 0, owes: 0 });
      householdExpenses.forEach(e => {
        if (e.paidBy) memberSplits[e.paidBy].paid = (memberSplits[e.paidBy].paid || 0) + e.amount;
        const perPerson = e.amount / (e.splitWith?.length || 1);
        e.splitWith?.forEach(id => {
          memberSplits[id].owes = (memberSplits[id].owes || 0) + perPerson;
        });
      });
      return `
        <div class="card">
          <h2>🏠 Household Expense Splitter</h2>
          <p class="text-muted">Split shared house expenses fairly among roommates</p>

          <div style="background: #F0F9FF; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;">
            <h3 style="margin-top: 0;">Add Roommate</h3>
            <div class="form-row">
              <input type="text" id="memberName" placeholder="Roommate name" style="flex: 1;">
              <button class="btn-primary" onclick="addHouseholdMember()" style="flex: 0.3;">Add</button>
            </div>
          </div>

          <div style="margin-bottom: 2rem;">
            <h3>Roommates (${householdMembers.length})</h3>
            ${householdMembers.length === 0 ? '<p class="text-muted">No roommates added yet</p>' : householdMembers.map(m => `
              <div class="flex-between" style="padding: 0.75rem; background: #F8FAFC; margin-bottom: 0.5rem; border-radius: 6px;">
                <span><strong>${m.name}</strong></span>
                <button onclick="removeHouseholdMember('${m.id}')" style="background: none; border: none; color: #999; cursor: pointer;">✕</button>
              </div>
            `).join('')}
          </div>

          <div style="background: #FEF3C7; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;">
            <h3 style="margin-top: 0;">Log Shared Expense</h3>
            <div class="form-row">
              <input type="text" id="expenseName" placeholder="e.g. Rent, WiFi, Groceries" style="flex: 1;">
              <input type="number" id="expenseAmount" placeholder="Amount" min="0" style="flex: 0.5;">
              <button class="btn-primary" onclick="addHouseholdExpense()" style="flex: 0.3;">Log</button>
            </div>
          </div>

          ${householdExpenses.length === 0 ? '<p class="text-muted" style="text-align: center; padding: 2rem;">No expenses logged yet</p>' : `
            <div style="background: white; border: 1px solid #E2E8F0; border-radius: 8px; padding: 1.5rem;">
              <h3 style="margin-top: 0; margin-bottom: 1.5rem;">Settlement Summary</h3>
              ${householdMembers.map(m => {
                const splits = memberSplits[m.id] || { paid: 0, owes: 0 };
                const balance = splits.paid - splits.owes;
                return `
                  <div style="padding: 1rem; background: ${balance > 0 ? '#F0FDF4' : '#FEF2F2'}; border-radius: 6px; margin-bottom: 0.75rem;">
                    <div class="flex-between" style="margin-bottom: 0.5rem;">
                      <span style="font-weight: 600;">${m.name}</span>
                      <span class="num" style="font-weight: 700; color: ${balance > 0 ? '#22C55E' : '#EF4444'};">${balance > 0 ? 'Gets back' : 'Owes'} ${AUD(Math.abs(balance))}</span>
                    </div>
                    <div style="font-size: 12px; color: #666;">Paid: ${AUD(splits.paid)} | Owes: ${AUD(splits.owes)}</div>
                  </div>
                `;
              }).join('')}
            </div>
          `}
        </div>
      `;
    }
    async function addHouseholdMember() {
      const name = document.getElementById('memberName')?.value.trim();
      if (!name) { showToast('Enter name', 'error'); return; }
      householdMembers.push({ id: Date.now().toString(), name });
      document.getElementById('memberName').value = '';
      await saveHouseholdMembers();
      renderMain();
    }
    async function removeHouseholdMember(id) {
      householdMembers = householdMembers.filter(m => m.id !== id);
      await saveHouseholdMembers();
      renderMain();
    }
    async function addHouseholdExpense() {
      const name = document.getElementById('expenseName')?.value.trim();
      const amount = parseFloat(document.getElementById('expenseAmount')?.value);
      if (!name || !amount || amount <= 0) { showToast('Fill all fields', 'error'); return; }
      householdExpenses.push({ id: Date.now().toString(), name, amount, date: today(), paidBy: householdMembers[0]?.id, splitWith: householdMembers.map(m => m.id) });
      document.getElementById('expenseName').value = '';
      document.getElementById('expenseAmount').value = '';
      await saveHouseholdExpenses();
      renderMain();
    }

    // Spending by Category
    function renderSpendingCategory() {
      const monthKey = getMonthKey();
      const monthExpenses = transactions.filter(t => t.type === 'expense' && getMonthKey(new Date(t.date + 'T00:00:00')) === monthKey);
      const byCat = {};
      monthExpenses.forEach(t => {
        const cat = t.category || 'Other';
        byCat[cat] = (byCat[cat] || 0) + t.amount;
      });
      const sorted = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
      const total = sorted.reduce((s, [,a]) => s + a, 0);
      return `
        <div class="card">
          <h2>📊 Spending by Category — ${monthLabel}</h2>
          <p class="text-muted">Where your money actually goes</p>

          ${sorted.length === 0 ? '<p class="text-muted" style="text-align: center; padding: 2rem;">No expenses this month</p>' : `
            <div style="display: grid; gap: 1rem;">
              ${sorted.map(([cat, amt]) => {
                const pct = (amt / total) * 100;
                return `
                  <div style="background: #F8FAFC; padding: 1.25rem; border-radius: 8px;">
                    <div class="flex-between" style="margin-bottom: 0.75rem;">
                      <span style="font-weight: 600;">${cat}</span>
                      <span class="num" style="font-weight: 700;">${AUD(amt)}</span>
                    </div>
                    <div class="progress" style="height: 8px; margin-bottom: 0.5rem;">
                      <div class="progress-fill" style="width: ${pct}%;"></div>
                    </div>
                    <div class="flex-between" style="font-size: 12px; color: #666;">
                      <span>${Math.round(pct)}% of spending</span>
                      <span>${monthExpenses.filter(t => t.category === cat).length} transactions</span>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          `}
        </div>
      `;
    }

    // Monthly Financial Health Check
    function renderMonthlyHealth() {
      const monthKey = getMonthKey();
      const inc = monthlyIncome();
      const bills = monthlyBillsTotal();
      const debt = monthlyDebtMin();
      const exp = transactions.filter(t => t.type === 'expense' && getMonthKey(new Date(t.date + 'T00:00:00')) === monthKey).reduce((s, t) => s + t.amount, 0);
      const surplus = inc - exp;
      const debtProgress = totalDebt() > 0 ? ((initialDebt || totalDebt()) - totalDebt()) / (initialDebt || 1) * 100 : 0;
      return `
        <div class="card" style="background: linear-gradient(135deg, #10B981 0%, #059669 100%); color: white; border-radius: 16px;">
          <h2 style="color: white; margin-bottom: 0.5rem;">🏥 Monthly Financial Health</h2>
          <p style="opacity: 0.8; font-size: 13px;">Your financial snapshot for ${monthLabel}</p>
        </div>

        <div class="card">
          <h2>📈 This Month's Metrics</h2>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
            <div style="background: #F0F9FF; padding: 1.25rem; border-radius: 8px; border-left: 4px solid #3B82F6;">
              <div class="text-muted" style="font-size: 12px; margin-bottom: 0.5rem;">Income</div>
              <div class="num" style="font-size: 20px; font-weight: 700; color: #3B82F6;">${AUD(inc)}</div>
            </div>
            <div style="background: #FEF3C7; padding: 1.25rem; border-radius: 8px; border-left: 4px solid #F59E0B;">
              <div class="text-muted" style="font-size: 12px; margin-bottom: 0.5rem;">Expenses</div>
              <div class="num" style="font-size: 20px; font-weight: 700; color: #D97706;">${AUD(exp)}</div>
            </div>
            <div style="background: #F0FDF4; padding: 1.25rem; border-radius: 8px; border-left: 4px solid #22C55E;">
              <div class="text-muted" style="font-size: 12px; margin-bottom: 0.5rem;">Surplus</div>
              <div class="num" style="font-size: 20px; font-weight: 700; color: #16A34A;">${AUD(surplus)}</div>
            </div>
            <div style="background: #F5F3FF; padding: 1.25rem; border-radius: 8px; border-left: 4px solid #8B5CF6;">
              <div class="text-muted" style="font-size: 12px; margin-bottom: 0.5rem;">Debt Paid Down</div>
              <div class="num" style="font-size: 20px; font-weight: 700; color: #7C3AED;">${Math.round(debtProgress)}%</div>
            </div>
          </div>

          <h3>💪 Health Status</h3>
          <div style="display: grid; gap: 0.75rem;">
            <div class="flex-between" style="padding: 1rem; background: ${surplus >= 0 ? '#F0FDF4' : '#FEF2F2'}; border-radius: 8px;">
              <span>Savings Status</span>
              <span style="font-weight: 700; color: ${surplus >= 0 ? '#22C55E' : '#EF4444'};">${surplus >= 0 ? '✓ Saving' : '⚠ Overspending'}</span>
            </div>
            <div class="flex-between" style="padding: 1rem; background: ${bills + debt <= inc * 0.7 ? '#F0FDF4' : '#FEF2F2'}; border-radius: 8px;">
              <span>Bills + Debt Coverage</span>
              <span style="font-weight: 700; color: ${bills + debt <= inc * 0.7 ? '#22C55E' : '#EF4444'};">${Math.round((bills + debt) / inc * 100)}% of income</span>
            </div>
            <div class="flex-between" style="padding: 1rem; background: ${totalDebt() > 0 ? '#F5F3FF' : '#F0FDF4'}; border-radius: 8px;">
              <span>Debt Progress</span>
              <span style="font-weight: 700; color: #7C3AED;">${totalDebt() > 0 ? `${Math.round(debtProgress)}% progress` : '✓ Debt-free'}</span>
            </div>
          </div>
        </div>
      `;
    }

    // Init
    async function init() {
      try {
        renderTabs();
        await loadData();
      } catch (e) {
        console.error('Init error:', e);
        renderTabs();
        renderAll();
      }
    }
    // Only auto-init if already unlocked (PIN screen calls init() on success)
    if (!pinLocked) init();
  </script>
